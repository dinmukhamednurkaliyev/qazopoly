name: Quality Assurance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      server: ${{ steps.filter.outputs.server }}
      configuration: ${{ steps.filter.outputs.configuration }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            frontend:
              - 'components/**'
              - 'pages/**'
              - 'assets/**'
              - 'app.vue'
            server:
              - 'server/**'
            configuration:
              - 'package.json'
              - 'bun.lockb'
              - 'nuxt.config.ts'
              - 'eslint.config.mjs'

  label-pull-request:
    name: Label Pull Request
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6.1.0
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

  run-quality-checks:
    name: Run Quality Checks
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.server == 'true' || needs.detect-changes.outputs.configuration == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: oven-sh/setup-bun@v2.2.0
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      
      - name: Analyze Code
        run: bun run lint
        
      - name: Validate Types
        run: bun run typecheck
        
      - name: Build Application
        run: bun run build
        env:
          NODE_ENV: production

  verify-status:
    name: Verify Status
    runs-on: ubuntu-latest
    needs: [run-quality-checks]
    if: always()
    steps:
      - name: Check Completion
        if: ${{ needs.run-quality-checks.result != 'success' }}
        run: exit 1