name: Quality Assurance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      server: ${{ steps.filter.outputs.server }}
      configuration: ${{ steps.filter.outputs.configuration }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            frontend:
              - 'components/**'
              - 'pages/**'
              - 'assets/**'
              - 'app.vue'
            server:
              - 'server/**'
            configuration:
              - 'package.json'
              - 'bun.lockb'
              - 'nuxt.config.ts'
              - 'eslint.config.mjs'
      - name: Log Detected Changes
        run: |
          echo -e "\e[34mFrontend changed: ${{ steps.filter.outputs.frontend }}\e[0m"
          echo -e "\e[34mServer changed: ${{ steps.filter.outputs.server }}\e[0m"
          echo -e "\e[34mConfig changed: ${{ steps.filter.outputs.configuration }}\e[0m"

  label-pull-request:
    name: Label Pull Request
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6.1.0
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

  run-quality-checks:
    name: Run Quality Checks
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.server == 'true' || needs.detect-changes.outputs.configuration == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: oven-sh/setup-bun@v2.2.0
      
      - name: Install Dependencies
        run: |
          echo -e "\e[36mInstalling dependencies...\e[0m"
          bun install --frozen-lockfile
      
      - name: Analyze Code
        run: |
          echo -e "\e[33mRunning static analysis...\e[0m"
          bun run lint || { echo -e "\e[31mLinting failed!\e[0m"; exit 1; }
        
      - name: Validate Types
        run: |
          echo -e "\e[33mChecking types...\e[0m"
          bun run typecheck || { echo -e "\e[31mTypecheck failed!\e[0m"; exit 1; }
        
      - name: Build Application
        run: |
          echo -e "\e[35mBuilding production build...\e[0m"
          bun run build || { echo -e "\e[31mBuild failed!\e[0m"; exit 1; }
        env:
          NODE_ENV: production

  verify-status:
    name: Verify Status
    runs-on: ubuntu-latest
    needs: [run-quality-checks]
    if: always()
    steps:
      - name: Report Results
        run: |
          if [ "${{ needs.run-quality-checks.result }}" == "success" ] || [ "${{ needs.run-quality-checks.result }}" == "skipped" ]; then
            echo -e "\e[32mQuality checks passed or were not required.\e[0m"
          else
            echo -e "\e[31mPipeline failed. Check previous logs for details.\e[0m"
            exit 1
          fi